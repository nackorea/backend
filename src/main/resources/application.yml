server:
  port: 3030
spring:
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: nac-korea-secret-key-must-be-at-least-256bits-long-for-hs256
  expiration: 60000        # 1분
  refresh-expiration: 60000  # 1분
#  expiration: 86400000        # 1일
#  refresh-expiration: 604800000  # 7일